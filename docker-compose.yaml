services:
  mariadb:
    image: mariadb
    healthcheck:
      test: ["CMD", "mariadb-check", "--all-databases", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE} 
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app-network

  web:
    image: nginx
    volumes:
      - ./nginx/sites-available/mywebapp.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - app
    networks:
      - app-network

  app: 
    build:
      dockerfile: Dockerfile
      context: .
    networks:
      - app-network

    #command: ["-db-host=mariadb", "-db-port=3306", "-db-name=${MARIADB_DATABASE}", "-db-password=${MARIADB_PASSWORD}", "-db-user=${MARIADB_USER}"]
    command:
      - "-port=5000"
      - "-db-host=mariadb"
      - "-db-port=3306"
      - "-db-name=${MARIADB_DATABASE}"
      - "-db-pass=${MARIADB_PASSWORD}"
      - "-db-user=${MARIADB_USER}"
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge
